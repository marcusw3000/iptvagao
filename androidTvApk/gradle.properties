org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# Ambiente selecionado: local, staging ou prod. Sobrescreva com -PapiEnv=staging
apiEnv=local

# Sobrescreve diretamente a URL final quando necessario:
# -PapiBaseUrl=https://sua-api.com/api/v1
apiBaseUrlLocal=http://10.0.2.2:3001/api/v1
apiBaseUrlStaging=https://staging.example.com/api/v1
apiBaseUrlProd=https://api.example.com/api/v1
