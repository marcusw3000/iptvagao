services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iptvagao
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/iptvagao
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      # Aponta pro serviço epg-grabber; import agendado roda 1h depois do grabber (ver EPG_IMPORT_CRON)
      EPG_SOURCE_URL: http://epg-grabber:3000/guide.xml
      EPG_IMPORT_CRON: ${EPG_IMPORT_CRON:-0 6 * * *}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full

  # Gera o guia de programação (XMLTV) a partir de sites públicos, usando os mesmos
  # tvg-id do iptv-org/iptv que já importamos no M3U — casa direto sem remapeamento.
  epg-grabber:
    image: ghcr.io/iptv-org/epg:master
    ports:
      - "3010:3000"
    environment:
      SITES: ${EPG_SITES:-meuguia.tv,mi.tv}
      CRON_SCHEDULE: ${EPG_GRABBER_CRON:-0 5 * * *}
    volumes:
      - epg_data:/epg/public
    profiles:
      - full

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:3001}
    depends_on:
      - api
    profiles:
      - full

volumes:
  postgres_data:
  epg_data:
